name: BasePMS Sync

on:
  # Scheduled: every Tuesday at 23:00 UTC
  schedule:
    - cron: '0 23 * * 2'

  # Manual force push via GitHub UI
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push to BasePMS tab instead of dated tab'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BasePMS sync
        env:
          BASEPMS_API_TOKEN: ${{ secrets.BASEPMS_API_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          FORCE_PUSH: ${{ github.event.inputs.force_push || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python basepms_sync.py
